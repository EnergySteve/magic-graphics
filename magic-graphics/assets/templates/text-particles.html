<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Word particles</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="1080" height="1920"></canvas></div>
<script>
// ====== EDIT THESE ======
const TEXT = "ENERGY";     // one short word, all caps looks best
const GOLD = "#F2C94C";    // accent / particle color
const BG   = "#000000";    // background
// =========================

const hex = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const G = hex(GOLD);
const c = document.getElementById('c'), x = c.getContext('2d');
function fit(){ const s = Math.min(innerWidth/1080, innerHeight/1920); c.style.width=(1080*s)+'px'; c.style.height=(1920*s)+'px'; }
addEventListener('resize', fit); fit();
document.body.style.background = BG;

const off = document.createElement('canvas'); off.width = 1080; off.height = 1920;
const o = off.getContext('2d');
o.fillStyle = '#fff'; o.textAlign = 'center'; o.textBaseline = 'middle';
let fs = 230; o.font = '900 ' + fs + 'px Arial, sans-serif';
while (o.measureText(TEXT).width > 980 && fs > 60){ fs -= 10; o.font = '900 ' + fs + 'px Arial, sans-serif'; }
o.fillText(TEXT, 540, 960);
const img = o.getImageData(0, 0, 1080, 1920).data;
const parts = [];
for (let yy = 0; yy < 1920; yy += 6) for (let xx = 0; xx < 1080; xx += 6)
  if (img[(yy*1080+xx)*4+3] > 128) parts.push({ hx: xx, hy: yy, x: xx, y: yy, vx: 0, vy: 0, a: 1, init: false });

const CYCLE = 4000, EXPLODE = 1500;
let start = performance.now();
const font = '900 ' + fs + 'px Arial, sans-serif';

function frame(now){
  const t = (now - start) % CYCLE;
  x.clearRect(0, 0, 1080, 1920);
  if (t < EXPLODE){
    x.save(); x.fillStyle = '#fff'; x.textAlign = 'center'; x.textBaseline = 'middle'; x.font = font;
    x.shadowColor = GOLD; x.shadowBlur = 30 * Math.min(1, t / 500);
    x.fillText(TEXT, 540, 960); x.restore();
    for (const p of parts){ p.x = p.hx; p.y = p.hy; p.a = 1; p.vx = 0; p.vy = 0; p.init = false; }
  } else {
    x.globalCompositeOperation = 'lighter';
    for (const p of parts){
      if (!p.init){ const dx=p.hx-540, dy=p.hy-960, ang=Math.atan2(dy,dx)+(Math.random()-0.5)*0.7, sp=2+Math.random()*9;
        p.vx=Math.cos(ang)*sp+(Math.random()-0.5)*2; p.vy=Math.sin(ang)*sp-Math.random()*3; p.init=true; }
      p.vy += 0.035; p.vx *= 0.992; p.vy *= 0.992; p.x += p.vx; p.y += p.vy;
      p.a = Math.max(0, 1 - (t - EXPLODE) / (CYCLE - EXPLODE));
      x.fillStyle = 'rgba(' + G[0] + ',' + G[1] + ',' + G[2] + ',' + p.a + ')';
      x.shadowColor = GOLD; x.shadowBlur = 7;
      x.beginPath(); x.arc(p.x, p.y, 2.4, 0, 7); x.fill();
    }
    x.globalCompositeOperation = 'source-over';
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
