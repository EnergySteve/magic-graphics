<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Handle reveal</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="1080" height="1920"></canvas></div>
<script>
// ====== EDIT THESE ======
const HANDLE = "@yourhandle";  // name / handle to reveal
const GOLD   = "#F2C94C";       // accent color
const BG     = "#000000";       // background
// =========================

const c = document.getElementById('c'), x = c.getContext('2d');
function fit(){ const s = Math.min(innerWidth/1080, innerHeight/1920); c.style.width=(1080*s)+'px'; c.style.height=(1920*s)+'px'; }
addEventListener('resize', fit); fit();
document.body.style.background = BG;
const hex = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const G = hex(GOLD), gold = a => 'rgba(' + G[0] + ',' + G[1] + ',' + G[2] + ',' + a + ')';

const off = document.createElement('canvas'); off.width=1080; off.height=1920; const o = off.getContext('2d');
o.fillStyle='#fff'; o.textAlign='center'; o.textBaseline='middle';
let fs = 128; o.font='800 '+fs+'px Arial, sans-serif';
while (o.measureText(HANDLE).width > 940 && fs > 50){ fs-=8; o.font='800 '+fs+'px Arial, sans-serif'; }
o.fillText(HANDLE, 540, 960);
const tw = o.measureText(HANDLE).width;
const img = o.getImageData(0,0,1080,1920).data;
const rnd = s => { const v = Math.sin(s*91.7)*43758.5; return v - Math.floor(v); };
const frags = []; let idx = 0;
for (let yy=0;yy<1920;yy+=5) for (let xx=0;xx<1080;xx+=5)
  if (img[(yy*1080+xx)*4+3] > 128){ frags.push({ hx:xx, hy:yy, sx:rnd(idx)*1080, sy:rnd(idx+7)*1920, d:rnd(idx+3)*0.4 }); idx++; }

const ASSEMBLE = 1200, SETTLE = 1500, UWIPE_S = 1300, UWIPE_E = 1750, CYCLE = 3500, easeOut = t => 1 - Math.pow(1-t,3);
let start = performance.now();
function frame(now){
  const t = (now-start)%CYCLE; x.clearRect(0,0,1080,1920);
  const fadeOut = t > 3200 ? 1 - (t-3200)/300 : 1, glitchOn = t < SETTLE;
  const gI = Math.max(0, 1 - t/SETTLE);
  const gx = glitchOn && rnd(Math.floor(now/50)) > 0.6 ? (rnd(now)-0.5)*26*gI : 0;
  x.save(); x.translate(gx,0);
  for (const f of frags){
    const p = Math.min(1, Math.max(0, (t/ASSEMBLE)-f.d)/(1-f.d)), e = easeOut(p);
    const jx = glitchOn ? (rnd(now*0.01+f.hx)-0.5)*16*(1-e) : 0, jy = glitchOn ? (rnd(now*0.01+f.hy)-0.5)*16*(1-e) : 0;
    const px = f.sx+(f.hx-f.sx)*e+jx, py = f.sy+(f.hy-f.sy)*e+jy;
    const white = glitchOn && rnd(Math.floor(now/40)+f.hx) > 0.93;
    x.fillStyle = white ? 'rgba(255,255,255,'+fadeOut+')' : gold(fadeOut);
    x.shadowColor = gold(0.8); x.shadowBlur = white ? 0 : 6;
    x.fillRect(px-2, py-2, 4, 4);
  }
  x.restore();
  if (t > UWIPE_S){
    const wp = Math.min(1, (t-UWIPE_S)/(UWIPE_E-UWIPE_S)), ux = 540-tw/2;
    x.fillStyle = gold(fadeOut); x.shadowColor = gold(0.9); x.shadowBlur = 18;
    x.fillRect(ux, 1050, tw*easeOut(wp), 6); x.shadowBlur = 0;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
