<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Glowing chart</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="1080" height="1920"></canvas></div>
<script>
// ====== EDIT THESE ======
const NUMBER = 500;                  // the number it counts up to
const LABEL  = "MEMBERS & GROWING";  // small label under the number
const GOLD   = "#F2C94C";            // accent color
const BG     = "#000000";            // background
// =========================

const c = document.getElementById('c'), x = c.getContext('2d');
function fit(){ const s = Math.min(innerWidth/1080, innerHeight/1920); c.style.width=(1080*s)+'px'; c.style.height=(1920*s)+'px'; }
addEventListener('resize', fit); fit();
document.body.style.background = BG;
const hex = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const G = hex(GOLD), rgba = (a) => 'rgba(' + G[0] + ',' + G[1] + ',' + G[2] + ',' + a + ')';

const L = 130, R = 950, TOP = 780, BOT = 1480, N = 44;
const pts = [];
for (let i = 0; i < N; i++){
  const f = i / (N - 1);
  const v = Math.max(0, Math.min(1, Math.pow(f, 0.78) + Math.sin(i*1.7)*0.05 + Math.sin(i*0.6)*0.04 + Math.sin(i*3.3)*0.025));
  pts.push({ x: L + f*(R-L), y: BOT - v*(BOT-TOP) });
}
const CYCLE = 4600, DRAW = 2000, easeOut = t => 1 - Math.pow(1-t,3);
let start = performance.now();

function lineAt(p){
  const total = N-1, fp = p*total, seg = Math.floor(fp), frac = fp-seg, out = [];
  for (let i=0;i<=Math.min(seg,total);i++) out.push(pts[i]);
  let tip = pts[Math.min(seg,total)];
  if (seg<total){ const a=pts[seg], b=pts[seg+1]; tip={x:a.x+(b.x-a.x)*frac, y:a.y+(b.y-a.y)*frac}; out.push(tip); }
  return { out, tip };
}
function frame(now){
  const t = (now-start)%CYCLE, draw = t<DRAW ? easeOut(t/DRAW) : 1;
  x.clearRect(0,0,1080,1920);
  const gridA = Math.min(1, t/600)*0.18;
  x.strokeStyle = rgba(gridA); x.lineWidth = 1;
  for (let i=0;i<=6;i++){ const gy=TOP+(BOT-TOP)*i/6; x.beginPath(); x.moveTo(L,gy); x.lineTo(R,gy); x.stroke(); }
  for (let i=0;i<=6;i++){ const gx=L+(R-L)*i/6; x.beginPath(); x.moveTo(gx,TOP); x.lineTo(gx,BOT); x.stroke(); }
  const { out, tip } = lineAt(draw);
  const grad = x.createLinearGradient(0,TOP,0,BOT); grad.addColorStop(0,rgba(0.22)); grad.addColorStop(1,rgba(0));
  x.beginPath(); x.moveTo(out[0].x,BOT); for (const p of out) x.lineTo(p.x,p.y); x.lineTo(tip.x,BOT); x.closePath(); x.fillStyle=grad; x.fill();
  x.save(); x.shadowColor=rgba(0.9); x.shadowBlur=26; x.strokeStyle=GOLD; x.lineWidth=6; x.lineJoin='round'; x.lineCap='round';
  x.beginPath(); x.moveTo(out[0].x,out[0].y); for (const p of out) x.lineTo(p.x,p.y); x.stroke(); x.restore();
  const tg = x.createRadialGradient(tip.x,tip.y,0,tip.x,tip.y,60); tg.addColorStop(0,'rgba(255,240,200,0.9)'); tg.addColorStop(1,rgba(0));
  x.fillStyle=tg; x.beginPath(); x.arc(tip.x,tip.y,60,0,7); x.fill();
  x.fillStyle='#fff'; x.shadowColor=GOLD; x.shadowBlur=20; x.beginPath(); x.arc(tip.x,tip.y,7,0,7); x.fill(); x.shadowBlur=0;
  const val = Math.floor(draw*NUMBER);
  x.textAlign='center'; x.textBaseline='alphabetic'; x.fillStyle='#fff'; x.font='800 130px Arial, sans-serif';
  x.shadowColor=rgba(0.5); x.shadowBlur=24; x.fillText("OVER " + val.toLocaleString(),540,600); x.shadowBlur=0;
  x.fillStyle=rgba(0.85); x.font='700 34px Arial, sans-serif'; x.fillText(LABEL,540,660);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
