<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Liquid gradient</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c" width="1080" height="1920"></canvas></div>
<script>
// ====== EDIT THESE ======
const COLOR_A = "#C9941F";   // deep gold
const COLOR_B = "#E0732F";   // amber
const COLOR_C = "#F2C94C";   // bright gold
// (this one has no text - it's a flowing background to put text/products on)
// =========================

const c = document.getElementById('c'), x = c.getContext('2d');
function fit(){ const s = Math.min(innerWidth/1080, innerHeight/1920); c.style.width=(1080*s)+'px'; c.style.height=(1920*s)+'px'; }
addEventListener('resize', fit); fit();
const hex = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const A = hex(COLOR_A), B = hex(COLOR_B), C = hex(COLOR_C);
const blobs = [
  { r:620, col:A, ax:320, ay:360, ox:540, oy:760,  k:1, ph:0.0 },
  { r:560, col:B, ax:360, ay:300, ox:540, oy:1160, k:1, ph:1.7 },
  { r:520, col:C, ax:280, ay:420, ox:540, oy:960,  k:2, ph:3.1 },
  { r:480, col:A, ax:400, ay:260, ox:540, oy:560,  k:1, ph:4.6 },
  { r:500, col:B, ax:300, ay:380, ox:540, oy:1360, k:2, ph:2.2 },
];
const PERIOD = 9000; let start = performance.now();
function frame(now){
  const t = ((now-start)%PERIOD)/PERIOD, a = t*Math.PI*2;
  x.globalCompositeOperation='source-over'; x.fillStyle='#050403'; x.fillRect(0,0,1080,1920);
  x.save(); x.filter='blur(70px)'; x.globalCompositeOperation='lighter';
  for (const b of blobs){
    const bx=b.ox+Math.cos(a*b.k+b.ph)*b.ax, by=b.oy+Math.sin(a+b.ph)*b.ay;
    const g=x.createRadialGradient(bx,by,0,bx,by,b.r);
    g.addColorStop(0,'rgba('+b.col[0]+','+b.col[1]+','+b.col[2]+',0.55)');
    g.addColorStop(1,'rgba('+b.col[0]+','+b.col[1]+','+b.col[2]+',0)');
    x.fillStyle=g; x.beginPath(); x.arc(bx,by,b.r,0,7); x.fill();
  }
  x.restore();
  const v=x.createRadialGradient(540,960,300,540,960,1200); v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.55)');
  x.globalCompositeOperation='source-over'; x.fillStyle=v; x.fillRect(0,0,1080,1920);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
