<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Story beats</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  #fit { position: fixed; top: 50%; left: 50%; width: 1080px; height: 1920px; transform-origin: center; }
  #stage { position: absolute; inset: 0; }
  .beat { position: absolute; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center; padding: 0 90px; box-sizing: border-box;
          text-align: center; will-change: opacity, transform; }
  .kick { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 700;
          font-size: 46px; letter-spacing: 8px; text-transform: uppercase; margin-bottom: 40px; opacity: .9; }
  .big  { font-family: 'Arial Black', 'Inter', Arial, sans-serif; font-weight: 900;
          font-size: 150px; line-height: 0.96; letter-spacing: 1px; text-transform: uppercase; }
  .rule { height: 10px; border-radius: 10px; margin-top: 56px; }
</style>
</head>
<body>
<div id="fit"><div id="stage"></div></div>
<script>
// ====== EDIT THESE ======
// Each beat is one moment of the story: a small KICKER line + a BIG line.
// 3-5 beats is the sweet spot. The LAST beat is the payoff - it pops in the accent color and holds.
const BEATS = [
  { kick: "THE PROBLEM", big: "TOO MANY CLIPS" },
  { kick: "THE FIX",     big: "ONE FOLDER" },
  { kick: "THE RESULT",  big: "POSTED IN MINUTES" },
];
const ACCENT = "#F2C94C";   // accent color (kicker + payoff glow)
const BG     = "#070708";   // background
const TEXT   = "#FFFFFF";   // main text color (use a dark ink like #2A2925 on a light background)
// =========================

document.body.style.background = BG;
const fitEl = document.getElementById('fit'), stage = document.getElementById('stage');
fitEl.style.background = BG;

// build one .beat element per beat
const els = BEATS.map((b, i) => {
  const last = i === BEATS.length - 1;
  const wrap = document.createElement('div'); wrap.className = 'beat';
  const k = document.createElement('div'); k.className = 'kick'; k.textContent = b.kick; k.style.color = ACCENT;
  const big = document.createElement('div'); big.className = 'big'; big.textContent = b.big;
  big.style.color = last ? ACCENT : TEXT;
  if (last) big.style.textShadow = '0 0 60px ' + ACCENT + '88';
  const r = document.createElement('div'); r.className = 'rule'; r.style.background = ACCENT;
  wrap.appendChild(k); wrap.appendChild(big); wrap.appendChild(r);
  stage.appendChild(wrap);
  return { wrap, rule: r, last };
});

function fit(){ fitEl.style.transform = 'translate(-50%,-50%) scale(' + Math.min(innerWidth/1080, innerHeight/1920) + ')'; }
addEventListener('resize', fit); fit();

// timing: each beat shows for BEAT ms, beats overlap by FADE ms (crossfade), the payoff holds longer
const BEAT = 2200, FADE = 480, HOLD = 1700, STEP = BEAT - FADE;
const s = [], e = [];
let cur = 0;
BEATS.forEach((_, i) => {
  const last = i === BEATS.length - 1;
  const dur = BEAT + (last ? HOLD : 0);
  s[i] = cur; e[i] = cur + dur;
  cur += last ? dur : STEP;
});
const CYCLE = e[e.length - 1];
const clamp01 = x => Math.max(0, Math.min(1, x));
const easeOut = t => 1 - Math.pow(1 - t, 3);

let start = performance.now();
function frame(now){
  const t = (now - start) % CYCLE;
  els.forEach((el, i) => {
    const fIn  = clamp01((t - s[i]) / FADE);
    const fOut = 1 - clamp01((t - (e[i] - FADE)) / FADE);
    const a = Math.min(fIn, fOut);
    el.wrap.style.opacity = a;
    const rise = (1 - easeOut(fIn)) * 46;     // slides up as it enters
    el.wrap.style.transform = 'translateY(' + rise + 'px)';
    // the accent underline grows out from center while the beat is on screen
    const grow = easeOut(clamp01((t - s[i]) / (BEAT * 0.7)));
    el.rule.style.width = (a > 0 ? grow * 380 : 0) + 'px';
  });
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
